<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polite Company</title>
    <meta
      name="description"
      content="Polite Company is a NYC jazz band playing jazz brunch Saturdays and Sundays, 12 to 3pm."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Patrick+Hand&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="poster">
      <span class="corner tl" aria-hidden="true"></span>
      <span class="corner tr" aria-hidden="true"></span>
      <span class="corner bl" aria-hidden="true"></span>
      <span class="corner br" aria-hidden="true"></span>

      <img
        class="hero-mark"
        src="Assets/top-card.png"
        alt="Polite Company front card"
      />

      <img
        class="band-photo"
        src="Assets/middle-photo.png"
        alt="Temple Court portrait"
      />

      <section class="contact" aria-label="Polite Company contact links">
        <p><strong>Website:</strong> <a href="https://politecompany.nyc" target="_blank" rel="noreferrer">politecompany.nyc</a></p>
        <p><strong>Venmo:</strong> <a href="https://venmo.com/politecompany" target="_blank" rel="noreferrer">@politecompany</a></p>
        <p><strong>IG:</strong> <a href="https://www.instagram.com/politecompanynyc" target="_blank" rel="noreferrer">@politecompanynyc</a></p>
        <p><strong>Email:</strong> <a href="mailto:info@politecompany.nyc">info@politecompany.nyc</a></p>
      </section>
    </main>
  </body>
</html>
