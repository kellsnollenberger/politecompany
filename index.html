<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polite Company</title>
    <meta
      name="description"
      content="Polite Company is a NYC jazz band playing jazz brunch Saturdays and Sundays, 12 to 3pm."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Patrick+Hand&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="poster">
      <span class="corner tl" aria-hidden="true"></span>
      <span class="corner tr" aria-hidden="true"></span>
      <span class="corner bl" aria-hidden="true"></span>
      <span class="corner br" aria-hidden="true"></span>

      <img
        class="hero-mark"
        src="Assets/front-card.jpg"
        alt="Polite Company front card"
      />

      <img
        class="band-photo"
        src="Assets/middle-photo.png"
        alt="Temple Court portrait"
      />

      <img class="contact-mark" src="Assets/back-card.jpg" alt="Polite Company back card with contact details" />
    </main>
  </body>
</html>
